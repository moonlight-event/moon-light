<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>MOON LIGHT</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0f0f14;
      margin: 0;
      padding: 0;
      color: #f8f5ee;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 150px;
      overflow: hidden;
      margin-bottom: 8px;
      background: linear-gradient(180deg, #15151c, #0f0f14);
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
      border-bottom: 2px solid #d4af37;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: -8%;
      bottom: -20px;
      width: 116%;
      height: 95px;
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      border-top-left-radius: 55% 100%;
      border-top-right-radius: 55% 100%;
      transform: rotate(-4deg);
      opacity: 0.9;
    }

    .title-under-header {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      color: #d4af37;
      margin: 10px 12px 18px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: #f8f5ee;
      margin-top: -12px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .container {
      width: 1100px;
      margin: 0 auto 24px;
      background: #1a1a22;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #3a3322;
      box-shadow: 0 10px 35px rgba(0,0,0,0.45);
    }

    h3 {
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 18px 0 12px;
      font-size: 22px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-weight: bold;
      color: #d4af37;
      line-height: 1.5;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 10px;
      font-size: 15px;
      border: 1px solid #4a3a19;
      border-radius: 8px;
      background: #111117;
      color: #f8f5ee;
    }

    input::placeholder,
    textarea::placeholder {
      color: #aaa;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #111117;
    }

    th, td {
      border: 1px solid #4a3a19;
      padding: 10px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111;
      font-weight: bold;
    }

    td input, td select, td button {
      margin: 0;
      font-size: 14px;
      padding: 10px 8px;
    }

    td input[type="number"] {
      min-width: 140px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn-add {
      width: auto;
      min-width: 150px;
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-delete {
      width: auto;
      padding: 8px 12px;
      cursor: pointer;
      background: #7a1f1f;
      color: white;
      border: none;
      font-weight: bold;
    }

    .total-box {
      margin-top: 14px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111;
      padding: 14px;
      border-radius: 8px;
      text-align: center;
    }

    .print-btn-container {
      margin-top: 16px;
    }

    .print-btn-container button {
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .item-combo {
      display: flex;
      align-items: stretch;
      width: 100%;
      border: 1px solid #4a3a19;
      border-radius: 8px;
      overflow: hidden;
      background: #111117;
    }

    .item-combo input {
      flex: 1;
      min-width: 0;
      width: 100%;
      padding: 10px 8px;
      font-size: 14px;
      border: none;
      border-radius: 0;
      background: transparent;
      color: #f8f5ee;
    }

    .item-combo select {
      width: 95px;
      min-width: 95px;
      padding: 10px 8px;
      font-size: 13px;
      border: none;
      border-right: 1px solid #4a3a19;
      border-radius: 0;
      background: #111117;
      color: #f8f5ee;
      cursor: pointer;
    }

    @page {
      size: A4 portrait;
      margin: 8mm;
    }

    @media print {
      html, body {
        width: 100%;
        overflow: visible !important;
        background: #fff !important;
        color: #000 !important;
      }

      body {
        margin: 0 !important;
        padding: 0 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .hero {
        height: auto !important;
        background: #fff !important;
        border: none !important;
        margin: 0 0 6px !important;
      }

      .hero::after {
        display: none !important;
      }

      .title-under-header {
        color: #000 !important;
        font-size: 24px !important;
        margin: 0 0 4px !important;
        letter-spacing: 0 !important;
      }

      .subtitle {
        color: #000 !important;
        font-size: 13px !important;
        margin: 0 0 12px !important;
      }

      .container {
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 8px !important;
        background: #fff !important;
        color: #000 !important;
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
        transform: scale(0.82);
        transform-origin: top center;
      }

      h3 {
        background: #e9e9e9 !important;
        color: #000 !important;
        border: 1px solid #000 !important;
        font-size: 18px !important;
        padding: 8px !important;
      }

      label {
        color: #000 !important;
      }

      input, select, textarea {
        background: #fff !important;
        color: #000 !important;
        border: 1px solid #000 !important;
      }

      table {
        background: #fff !important;
        color: #000 !important;
      }

      th {
        background: #e9e9e9 !important;
        color: #000 !important;
        border: 1px solid #000 !important;
      }

      td {
        background: #fff !important;
        color: #000 !important;
        border: 1px solid #000 !important;
      }

      .item-combo {
        background: #fff !important;
        border: 1px solid #000 !important;
      }

      .item-combo input,
      .item-combo select {
        background: #fff !important;
        color: #000 !important;
        border-color: #000 !important;
      }

      .total-box {
        background: #e9e9e9 !important;
        color: #000 !important;
        border: 1px solid #000 !important;
        font-size: 20px !important;
      }

      .btn-add,
      .btn-delete,
      .print-btn-container {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <header class="hero"></header>

  <div class="title-under-header">MOON LIGHT</div>
  <div class="subtitle">Event And Wedding Organizer</div>

  <div class="container">
    <div class="grid">
      <div class="field">
        <label>العنوان</label>
        <input type="text" placeholder="مثال: رسال">
      </div>

      <div class="field">
        <label>تاريخ التحرير</label>
        <input type="date">
      </div>

      <div class="field">
        <label>القسم</label>
        <input type="text" placeholder="القسم">
      </div>

      <div class="field">
        <label>نوع الحفلة</label>
        <select>
          <option value="">اختر</option>
          <option>زواج</option>
          <option>ملكة</option>
          <option>تخرج</option>
          <option>استقبال</option>
          <option>خطوبة</option>
          <option>عقد قران</option>
          <option>استقبال مولود</option>
          <option>عيد ميلاد</option>
          <option>افتتاح</option>
          <option>تكريم</option>
          <option>مناسبة خاصة</option>
          <option>أخرى</option>
        </select>
      </div>

      <div class="field">
        <label>يوم الحفلة</label>
        <select>
          <option value="">اختر</option>
          <option>الأحد</option>
          <option>الاثنين</option>
          <option>الثلاثاء</option>
          <option>الأربعاء</option>
          <option>الخميس</option>
          <option>الجمعة</option>
          <option>السبت</option>
        </select>
      </div>

      <div class="field">
        <label>تاريخ الحفلة</label>
        <input type="date">
      </div>

      <div class="field">
        <label>اسم العميل</label>
        <input type="text" placeholder="اسم العميل">
      </div>

      <div class="field">
        <label>رقم الجوال</label>
        <input type="tel" placeholder="05xxxxxxxx">
      </div>
    </div>

    <h3>بيانات الفاتورة</h3>

    <table>
      <thead>
        <tr>
          <th>الصنف</th>
          <th>العدد</th>
          <th>السعر</th>
          <th>الإجمالي</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="actions">
      <button type="button" class="btn-add" onclick="addRow()">+ إضافة سطر</button>
    </div>

    <div class="total-box">
      المجموع: <span id="grandTotal">0</span> ريال
    </div>

    <h3>الملاحظات</h3>
    <textarea placeholder="اكتب الملاحظات هنا"></textarea>

    <div class="print-btn-container">
      <button type="button" onclick="window.print()">طباعة النموذج</button>
    </div>
  </div>

  <script>
    function numbersOptions(max) {
      let options = '<option value="">اختر</option>';
      for (let i = 1; i <= max; i++) {
        options += `<option value="${i}">${i}</option>`;
      }
      return options;
    }

    function fillItem(selectEl) {
      const row = selectEl.closest("tr");
      const input = row.querySelector(".item-input");

      if (selectEl.value === "أخرى") {
        input.value = "";
        input.focus();
      } else if (selectEl.value) {
        input.value = selectEl.value;
      }
    }

    function rowHtml() {
      return `
        <tr>
          <td>
            <div class="item-combo">
              <select onchange="fillItem(this)">
                <option value="">اختر</option>
                <option value="كوشة">كوشة</option>
                <option value="مدخل">مدخل</option>
                <option value="طاولات استقبال">طاولات استقبال</option>
                <option value="تنسيق طاولات الخدمة">تنسيق طاولات الخدمة</option>
                <option value="طاولات خدمة">طاولات خدمة</option>
                <option value="خداديات">خداديات</option>
                <option value="بوفات">بوفات</option>
                <option value="ستاند عبايات">ستاند عبايات</option>
                <option value="تنسيق ممر خارجي">تنسيق ممر خارجي</option>
                <option value="تنسيق مسبح">تنسيق مسبح</option>
                <option value="تنسيق طاولة طعام">تنسيق طاولة طعام</option>
                <option value="شاشة استقبال">شاشة استقبال</option>
                <option value="قهوجية">قهوجية</option>
                <option value="صبابة">صبابة</option>
                <option value="عاملة ركن عطور">عاملة ركن عطور</option>
                <option value="عاملة ركن قهوة">عاملة ركن قهوة</option>
                <option value="ستيج">ستيج</option>
                <option value="ممر">ممر</option>
                <option value="ركن عطور">ركن عطور</option>
                <option value="ركن قهوة">ركن قهوة</option>
                <option value="سجاد أحمر">سجاد أحمر</option>
                <option value="سجاد موف">سجاد موف</option>
                <option value="ورد أحمر">ورد أحمر</option>
                <option value="ورد أبيض">ورد أبيض</option>
                <option value="ورد بنفسجي">ورد بنفسجي</option>
                <option value="ورد وردي">ورد وردي</option>
                <option value="ورد سماوي">ورد سماوي</option>
                <option value="قهوجي">قهوجي</option>
                <option value="صباب">صباب</option>
                <option value="أخرى">أخرى</option>
              </select>
              <input type="text" class="item-input" placeholder="اختر أو اكتب الصنف">
            </div>
          </td>
          <td>
            <select class="qty-select" onchange="calculateRow(this)">
              ${numbersOptions(50)}
            </select>
          </td>
          <td>
            <input type="number" min="0" placeholder="السعر" oninput="calculateRow(this)">
          </td>
          <td class="rowTotal">0</td>
          <td>
            <button type="button" class="btn-delete" onclick="removeRow(this)">✖</button>
          </td>
        </tr>
      `;
    }

    function addRow() {
      document.getElementById("tableBody").insertAdjacentHTML("beforeend", rowHtml());
    }

    function removeRow(button) {
      const row = button.closest("tr");
      if (row) {
        row.remove();
        calculateGrandTotal();
      }
    }

    function calculateRow(element) {
      const row = element.closest("tr");
      if (!row) return;

      const qty = Number(row.querySelector(".qty-select").value || 0);
      const price = Number(row.querySelector('input[type="number"]').value || 0);
      const total = qty * price;

      row.querySelector(".rowTotal").textContent = isNaN(total) ? 0 : total;
      calculateGrandTotal();
    }

    function calculateGrandTotal() {
      let sum = 0;
      document.querySelectorAll(".rowTotal").forEach(cell => {
        const val = Number(cell.textContent);
        if (!isNaN(val)) sum += val;
      });
      document.getElementById("grandTotal").textContent = sum;
    }

    window.onload = function () {
      addRow();

      const today = new Date().toISOString().split('T')[0];
      const dateInput = document.querySelector('input[type="date"]');

      dateInput.value = today;
      dateInput.disabled = true;

      const hiddenInput = document.createElement("input");
      hiddenInput.type = "hidden";
      hiddenInput.name = "edit_date";
      hiddenInput.value = today;

      dateInput.parentNode.appendChild(hiddenInput);
    };
  </script>

</body>
</html>
