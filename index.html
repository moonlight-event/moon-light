<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOON LIGHT</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 0;
      color: #111111;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 150px;
      overflow: hidden;
      margin-bottom: 8px;
      background: #ffffff;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
      border-bottom: 2px solid #d4af37;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: -8%;
      bottom: -20px;
      width: 116%;
      height: 95px;
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      border-top-left-radius: 55% 100%;
      border-top-right-radius: 55% 100%;
      transform: rotate(-4deg);
      opacity: 0.95;
    }

    .title-under-header {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      color: #111111;
      margin: 10px 12px 18px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: #555555;
      margin-top: -12px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .container {
      width: 1100px;
      max-width: calc(100% - 24px);
      margin: 0 auto 24px;
      background: #ffffff;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #d4af37;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h3 {
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111111;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 18px 0 12px;
      font-size: 22px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-weight: bold;
      color: #111111;
      line-height: 1.5;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 10px;
      font-size: 15px;
      border: 1px solid #d4af37;
      border-radius: 8px;
      background: #ffffff;
      color: #111111;
    }

    .phone-input {
      direction: ltr;
      text-align: center;
      letter-spacing: 0;
      font-family: Arial, sans-serif;
    }

    input::placeholder,
    textarea::placeholder {
      color: #888888;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #ffffff;
      table-layout: fixed;
    }

    .item-col { width: 44%; }
    .qty-col { width: 10%; }
    .price-col { width: 16%; }
    .total-col { width: 18%; }
    .delete-col { width: 12%; }

    th, td {
      border: 1px solid #d4af37;
      padding: 10px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111111;
      font-weight: bold;
    }

    td input, td select, td button {
      margin: 0;
      font-size: 14px;
      padding: 10px 8px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn-add {
      width: auto;
      min-width: 150px;
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111111;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-delete {
      width: auto;
      padding: 8px 12px;
      cursor: pointer;
      background: #7a1f1f;
      color: white;
      border: none;
      font-weight: bold;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .summary-box {
      background: #fffaf0;
      border: 1px solid #d4af37;
      color: #111111;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
    }

    .summary-box span {
      display: block;
      margin-top: 8px;
      font-size: 22px;
      color: #111111;
    }

    .deposit-box input {
      margin-top: 8px;
      text-align: center;
      font-weight: bold;
    }

    .final-box {
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111111;
    }

    .print-btn-container {
      margin-top: 16px;
    }

    .print-btn-container button {
      background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b);
      color: #111111;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .item-input {
      width: 100%;
      text-align: center;
    }

    @page {
      size: A4 portrait;
      margin: 6mm;
    }

    @media print {
      html, body {
        width: 210mm !important;
        min-width: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #ffffff !important;
        color: #111111 !important;
        overflow: visible !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .hero {
        height: 80px !important;
        margin-bottom: 4px !important;
        border-bottom: 2px solid #d4af37 !important;
      }

      .hero::after {
        display: block !important;
        background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b) !important;
      }

      .title-under-header {
        color: #111111 !important;
        font-size: 22px !important;
        margin: 4px 0 2px !important;
      }

      .subtitle {
        color: #555555 !important;
        font-size: 12px !important;
        margin: 0 0 8px !important;
      }

      .container {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        margin: 0 !important;
        padding: 6px !important;
        border: 1px solid #d4af37 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
      }

      .grid {
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 6px !important;
      }

      h3, th, .final-box {
        background: linear-gradient(90deg, #b8860b, #f1d36b, #b8860b) !important;
        color: #111111 !important;
        border-color: #d4af37 !important;
      }

      input, select, textarea, table, th, td, .summary-box {
        border-color: #d4af37 !important;
        color: #111111 !important;
      }

      input, select, textarea {
        background: #ffffff !important;
      }

      .phone-input {
        direction: ltr !important;
        text-align: center !important;
        font-size: 10px !important;
        padding: 5px 2px !important;
        letter-spacing: 0 !important;
        font-family: Arial, sans-serif !important;
      }

      table {
        width: 100% !important;
        table-layout: fixed !important;
      }

      .item-col { width: 46% !important; }
      .qty-col { width: 9% !important; }
      .price-col { width: 15% !important; }
      .total-col { width: 18% !important; }
      .delete-col { width: 12% !important; }

      th, td {
        padding: 5px !important;
        font-size: 11px !important;
      }

      input, select, textarea {
        font-size: 11px !important;
        padding: 6px !important;
      }

      .summary-grid {
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 6px !important;
      }

      .summary-box {
        background: #fffaf0 !important;
        padding: 7px !important;
        font-size: 11px !important;
      }

      .summary-box span {
        font-size: 14px !important;
      }

      textarea {
        min-height: 70px !important;
      }

      .btn-add,
      .btn-delete,
      .print-btn-container {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <header class="hero"></header>

  <div class="title-under-header">MOON LIGHT</div>
  <div class="subtitle">Event And Wedding Organizer</div>

  <div class="container">
    <div class="grid">
      <div class="field">
        <label>العنوان</label>
        <input type="text" placeholder="مثال: رسال">
      </div>

      <div class="field">
        <label>تاريخ التحرير</label>
        <input type="date">
      </div>

      <div class="field">
        <label>نوع الحفلة</label>
        <select>
          <option value="">اختر</option>
          <option>زواج</option>
          <option>ملكة</option>
          <option>تخرج</option>
          <option>استقبال</option>
          <option>خطوبة</option>
          <option>عقد قران</option>
          <option>استقبال مولود</option>
          <option>عيد ميلاد</option>
          <option>افتتاح</option>
          <option>تكريم</option>
          <option>مناسبة خاصة</option>
          <option>أخرى</option>
        </select>
      </div>

      <div class="field">
        <label>يوم الحفلة</label>
        <select>
          <option value="">اختر</option>
          <option>الأحد</option>
          <option>الاثنين</option>
          <option>الثلاثاء</option>
          <option>الأربعاء</option>
          <option>الخميس</option>
          <option>الجمعة</option>
          <option>السبت</option>
        </select>
      </div>

      <div class="field">
        <label>تاريخ الحفلة</label>
        <input type="date">
      </div>

      <div class="field">
        <label>اسم العميل</label>
        <input type="text" placeholder="اسم العميل">
      </div>

      <div class="field">
        <label>رقم الجوال</label>
        <input type="tel" class="phone-input" placeholder="05xxxxxxxx" maxlength="10">
      </div>
    </div>

    <h3>بيانات الفاتورة</h3>

    <datalist id="itemsList">
      <option value="تنسيق الكوشة">
        <option value="تنسيق المدخل">
          <option value="تنسيق بودر روم">
            <option value="تنسيق المغاسل">
               <option value="تنسيق البوابة + إضافة لوقو على البوابة">
                  <option value="تنسيق طاولات الخدمة">
                     <option value="تنسيق ممر خارجي">
      <option value="تنسيق مسبح">
      <option value="تنسيق طاولة طعام">
         <option value="تنسيق اوت دور">
         <option value="ستاند شبكة ">
      <option value="تغيير لون ورد">
        <option value="مانيكان ">
      <option value="خلفية ستارة / بنر اختياري">
      <option value="تراس حسب التصميم">
      <option value="خلفية كوشة">
      <option value="بوفات VIP">
      <option value="طاولة الحلويات والعلك">
      <option value="طاولات خدمة VIP">
      <option value="طاولات استقبال">
      <option value="طاولات خدمة">
      <option value="خداديات">
      <option value="بوفات">
      <option value="ستاند عبايات">
      <option value="شاشة استقبال">
      <option value="قهوجية">
      <option value="صبابة">
      <option value="عاملة ركن عطور">
      <option value="عاملة ركن قهوة">
      <option value="ستيج">
      <option value="ممر">
      <option value="ركن عطور">
      <option value="ركن قهوة">
      <option value="سجاد أحمر">
      <option value="سجاد موف">
      <option value="ورد أحمر">
      <option value="ورد أبيض">
      <option value="ورد بنفسجي">
      <option value="ورد وردي">
      <option value="ورد سماوي">
      <option value="قهوجي">
      <option value="صباب">
      <option value="مساعدة قهوجية">
      <option value="عاملة خدمة">
      <option value="عامل نظافة">
      <option value="عاملة نظافة">
      <option value="مشرفة عامة">
      <option value="مشرفة عبايات">
      <option value="مشروب ترحيبي">
      <option value="قهوة سعودية">
      <option value="شاي أحمر">
      <option value="شاي نعناع">
      <option value="شاي ألوان">
      <option value="كبتشينو">
      <option value="قهوة تركية">
      <option value="ماء">
    </datalist>

    <table>
      <colgroup>
        <col class="item-col">
        <col class="qty-col">
        <col class="price-col">
        <col class="total-col">
        <col class="delete-col">
      </colgroup>

      <thead>
        <tr>
          <th>الصنف</th>
          <th>العدد</th>
          <th>السعر</th>
          <th>الإجمالي</th>
          <th>حذف</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>

    <div class="actions">
      <button type="button" class="btn-add" onclick="addRow()">+ إضافة سطر</button>
    </div>

    <div class="summary-grid">
      <div class="summary-box">
        الإجمالي قبل الضريبة
        <span><span id="subTotal">0</span> ريال</span>
      </div>

      <div class="summary-box">
        مبلغ الضريبة 15%
        <span><span id="taxAmount">0</span> ريال</span>
      </div>

      <div class="summary-box deposit-box">
        العربون
        <input type="number" id="depositAmount" min="0" value="0" oninput="calculateGrandTotal()">
      </div>

      <div class="summary-box final-box">
        المتبقي بعد العربون
        <span><span id="finalTotal">0</span> ريال</span>
      </div>
    </div>

    <h3>الملاحظات</h3>
    <textarea placeholder="اكتب الملاحظات هنا"></textarea>

    <div class="print-btn-container">
      <button type="button" onclick="window.print()">طباعة / حفظ PDF</button>
    </div>
  </div>

  <script>
    const TAX_RATE = 0.15;

    function numbersOptions(max) {
      let options = '<option value="">اختر</option>';
      for (let i = 1; i <= max; i++) {
        options += `<option value="${i}">${i}</option>`;
      }
      return options;
    }

    function rowHtml() {
      return `
        <tr>
          <td>
            <input 
              type="text" 
              class="item-input" 
              list="itemsList" 
              placeholder="اكتب أو اختر الصنف"
            >
          </td>

          <td>
            <select class="qty-select" onchange="calculateRow(this)">
              ${numbersOptions(50)}
            </select>
          </td>

          <td>
            <input type="number" min="0" placeholder="السعر" oninput="calculateRow(this)">
          </td>

          <td class="rowTotal">0</td>

          <td>
            <button type="button" class="btn-delete" onclick="removeRow(this)">✖</button>
          </td>
        </tr>
      `;
    }

    function addRow() {
      document.getElementById("tableBody").insertAdjacentHTML("beforeend", rowHtml());
    }

    function removeRow(button) {
      const row = button.closest("tr");
      if (row) {
        row.remove();
        calculateGrandTotal();
      }
    }

    function calculateRow(element) {
      const row = element.closest("tr");
      if (!row) return;

      const qty = Number(row.querySelector(".qty-select").value || 0);
      const price = Number(row.querySelector('input[type="number"]').value || 0);
      const total = qty * price;

      row.querySelector(".rowTotal").textContent = isNaN(total) ? 0 : total.toFixed(2);
      calculateGrandTotal();
    }

    function calculateGrandTotal() {
      let subTotal = 0;

      document.querySelectorAll(".rowTotal").forEach(cell => {
        const val = Number(cell.textContent);
        if (!isNaN(val)) subTotal += val;
      });

      const taxAmount = subTotal * TAX_RATE;
      const totalWithTax = subTotal + taxAmount;
      const deposit = Number(document.getElementById("depositAmount").value || 0);
      const finalTotal = totalWithTax - deposit;

      document.getElementById("subTotal").textContent = subTotal.toFixed(2);
      document.getElementById("taxAmount").textContent = taxAmount.toFixed(2);
      document.getElementById("finalTotal").textContent = finalTotal < 0 ? "0.00" : finalTotal.toFixed(2);
    }

    window.onload = function () {
      addRow();

      const today = new Date().toISOString().split('T')[0];
      const dateInputs = document.querySelectorAll('input[type="date"]');

      if (dateInputs[0]) {
        dateInputs[0].value = today;
        dateInputs[0].disabled = true;

        const hiddenInput = document.createElement("input");
        hiddenInput.type = "hidden";
        hiddenInput.name = "edit_date";
        hiddenInput.value = today;

        dateInputs[0].parentNode.appendChild(hiddenInput);
      }
    };
  </script>

</body>
</html>
